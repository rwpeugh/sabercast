[browser]
gatherUsageStats = false

[theme]
primaryColor = "#C8102E"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor = "#1A1A1A"
font = "sans serif"

[server]
headless = true

[client]
# Show full error tracebacks in the browser rather than redacting them.
# Useful for diagnosing deployment-only issues. Turn off for any production
# app handling user data; safe here because nothing is user-specific.
showErrorDetails = "full"
